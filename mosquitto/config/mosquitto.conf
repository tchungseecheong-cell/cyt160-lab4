# Enable per-listener security settings (required for Mosquitto 2.x) 
per_listener_settings true 
# ─── Plaintext listener (internal use only — Suricata monitoring) ────── 
listener 1883 0.0.0.0 
allow_anonymous true 
# ─── TLS listener (for Raspberry Pi connections) ──────────────────────── 
listener 8883 0.0.0.0 
allow_anonymous false 
# CA certificate — used to verify client certificates 
cafile /mosquitto/certs/ca.crt 
# Broker certificate and private key 
certfile /mosquitto/certs/broker.crt 
keyfile  /mosquitto/certs/broker.key 
# Require clients to present a valid certificate signed by our CA 
require_certificate true 
use_identity_as_username true 
# TLS version 
tls_version tlsv1.2 
















